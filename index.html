<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mario-Inspired Platformer Engine</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #5C94FC;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        canvas {
            border: 2px solid #000;
            background-color: #5C94FC;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #ui {
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            z-index: 100;
            position: relative;
        }

        #controls {
            color: white;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        /* Mobile-specific styles */
        @media (max-width: 1024px) {
            #controls {
                display: none; /* Hide keyboard controls on mobile */
            }
            
            canvas {
                border: none;
                width: 100vw;
                height: 100vh;
            }
            
            #ui {
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 14px;
                margin: 0;
                background: rgba(0, 0, 0, 0.5);
                padding: 5px 10px;
                border-radius: 5px;
            }
            
            #gameContainer {
                padding: 0;
            }
        }

        @media (max-width: 768px) {
            #ui {
                font-size: 12px;
                top: 5px;
            }
        }

        @media (max-width: 480px) {
            #ui {
                font-size: 10px;
                padding: 3px 6px;
            }
        }

        /* Landscape orientation on mobile */
        @media (max-width: 1024px) and (orientation: landscape) {
            #ui {
                top: 5px;
                font-size: 12px;
            }
        }

        /* Portrait orientation adjustments */
        @media (max-width: 768px) and (orientation: portrait) {
            canvas {
                height: calc(100vh - 60px); /* Account for mobile browser UI */
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div>Score: <span id="score">000000</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="controls">
            <p>Desktop: Arrow Keys to Move, Space to Jump, Z to Run, X for Fireball, R to Restart</p>
            <p>Mobile: Use on-screen touch controls</p>
        </div>
    </div>

    <!-- Core Engine -->
    <script src="src/core/Vector2.js"></script>
    <script src="src/core/GameObject.js"></script>
    <script src="src/core/Physics.js"></script>
    <script src="src/core/TouchInput.js"></script>
    <script src="src/core/Input.js"></script>
    <script src="src/core/Audio.js"></script>
    <script src="src/utils/SpriteGenerator.js"></script>
    <script src="src/core/SpriteManager.js"></script>
    <script src="src/core/GameEngine.js"></script>
    
    <!-- Game Systems -->
    <script src="src/systems/AnimationSystem.js"></script>
    <script src="src/systems/CollisionSystem.js"></script>
    <script src="src/systems/BackgroundSystem.js"></script>
    <script src="src/systems/RenderSystem.js"></script>
    
    <!-- Game Objects -->
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/Enemy.js"></script>
    <script src="src/entities/Goomba.js"></script>
    <script src="src/entities/Koopa.js"></script>
    <script src="src/entities/PiranhaPlant.js"></script>
    <script src="src/entities/BuzzyBeetle.js"></script>
    <script src="src/entities/Spiny.js"></script>
    <script src="src/entities/Boo.js"></script>
    <script src="src/entities/PowerUp.js"></script>
    <script src="src/entities/Mushroom.js"></script>
    <script src="src/entities/FireFlower.js"></script>
    <script src="src/entities/IceFlower.js"></script>
    <script src="src/entities/Star.js"></script>
    <script src="src/entities/OneUpMushroom.js"></script>
    <script src="src/entities/Fireball.js"></script>
    <script src="src/entities/Iceball.js"></script>
    <script src="src/entities/Coin.js"></script>
    <script src="src/entities/Block.js"></script>
    <script src="src/entities/Pipe.js"></script>
    
    <!-- Level System -->
    <script src="src/level/Tile.js"></script>
    <script src="src/level/Level.js"></script>
    <script src="src/level/LevelLoader.js"></script>
    
    <!-- Game States -->
    <script src="src/states/GameState.js"></script>
    <script src="src/states/MenuState.js"></script>
    <script src="src/states/PlayState.js"></script>
    <script src="src/states/GameOverState.js"></script>
    
    <!-- Main Game -->
    <script src="src/Game.js"></script>
    
    <script>
        // Initialize the game when the page loads
        window.addEventListener('load', () => {
            const canvas = document.getElementById('gameCanvas');
            window.game = new Game(canvas);
            window.game.start();
        });
    </script>
</body>
</html>
